services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"  # 外部访问 8001，内部容器仍是 8000
    volumes:
      - ./backend:/app
    environment:
      - ENV=production
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8001
    ports:
      - "3001:3000"  # 外部访问 3001，内部容器仍是 3000
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - backend
    restart: always
